<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-sm rounded-2xl shadow-xl border border-slate-100 p-6 space-y-6">
        <div>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Create an Account</h1>
            <p class="text-sm text-slate-500">Sign up to start tracking your tasks.</p>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div class="space-y-3 font-medium text-sm text-slate-600">
                {{ form.as_p }}
            </div>

            <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-xl shadow-sm transition-all transform active:scale-95 mt-4">
                Sign Up
            </button>
        </form>

        <div class="text-center pt-2">
            <p class="text-xs text-slate-500">Already have an account? <a href="{% url 'login' %}" class="text-indigo-600 hover:underline">Log in</a></p>
        </div>
    </div>

</body>
</html>
