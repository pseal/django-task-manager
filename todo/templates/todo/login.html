<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-sm rounded-2xl shadow-xl border border-slate-100 p-6 space-y-6">
        <div>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Welcome Back</h1>
            <p class="text-sm text-slate-500">Log in to manage your tasks.</p>
        </div>

        <div class="text-center pt-4">
            <p class="text-xs text-slate-500">Don't have an account? <a href="{% url 'register' %}" class="text-indigo-600 hover:underline">Sign up</a></p>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Username</label>
                <input type="text" name="username" required
                       class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50/50">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Password</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50/50">
            </div>
            <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-xl shadow-sm transition-all transform active:scale-95">
                Log In
            </button>
        </form>
    </div>

</body>
</html>
